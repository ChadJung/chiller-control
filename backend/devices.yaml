# === Device Configuration ===
# Add/remove devices here. No code changes needed.
# Each device = one chiller unit on a Modbus bus.

devices:
  - id: "chiller-01"
    name: "Chiller #1"
    name_ko: "냉동기 #1"
    location: "기계실 A"
    register_map: "register_maps/chiller_default.yaml"
    connection:
      mode: "tcp"                # tcp | rtu
      tcp_host: "127.0.0.1"     # 실기기: 게이트웨이 IP (기본 192.168.0.7)
      tcp_port: 502              # Waveshare Modbus TCP Gateway 모드 기본 포트
      # rtu_port: "COM3"        # RTU 모드 시 사용
      # baudrate: 9600           # 냉동기 RS-485 설정에 맞춤
      timeout: 3
    unit_id: 1                   # Modbus slave ID

  - id: "chiller-02"
    name: "Chiller #2"
    name_ko: "냉동기 #2"
    location: "기계실 A"
    register_map: "register_maps/chiller_default.yaml"
    connection:
      mode: "tcp"
      tcp_host: "127.0.0.1"     # 실기기: 게이트웨이 IP
      tcp_port: 502
      timeout: 3
    unit_id: 2

  - id: "chiller-03"
    name: "Chiller #3"
    name_ko: "냉동기 #3"
    location: "기계실 B"
    register_map: "register_maps/chiller_default.yaml"
    connection:
      mode: "tcp"
      tcp_host: "127.0.0.1"     # 실기기: 게이트웨이 IP
      tcp_port: 502
      timeout: 3
    unit_id: 3

# === Notes ===
# - Waveshare RS485-TO-WIFI-ETH 기본 설정:
#   IP: 192.168.0.7 / Port: 502 (Modbus TCP Gateway 모드)
#   Baud: 게이트웨이 웹UI에서 냉동기에 맞게 설정 (보통 9600)
# - Same gateway: use same tcp_host/port, different unit_id
# - Different gateway: use different tcp_host/port
# - Max 8 TCP clients per gateway
# - No limit on number of devices
