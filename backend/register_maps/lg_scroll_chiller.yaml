# LG Air-Cooled Scroll Chiller (ACHH / ACAH Series)
# Based on MFL67262616 manual, pages 108~113
# RS-485: 9600bps, 8N1, CH4 (A, B)
# NOTE: Modbus addresses use protocol addresses (0-based).
#   Manual address → protocol address conversion:
#   Coil: addr - 1, Discrete Input: addr - 10001
#   Input Register: addr - 30001, Holding Register: addr - 40001

metadata:
  manufacturer: "LG"
  model: "ACHH/ACAH Scroll Chiller"
  modbus_unit_id: 1
  encoding: "big-endian"
  manual_ref: "MFL67262616"

registers:
  # === COIL REGISTERS (FC1/FC5) - Read/Write ===
  - id: "run_stop"
    name: "Run/Stop Command"
    name_ko: "운전/정지"
    address: 0          # Manual addr 1 → protocol 0
    function_code: 1
    write_function_code: 5
    data_type: "bool"
    access: "read_write"
    category: "control"
    enum:
      0: "정지"
      1: "운전"

  - id: "reset_run_hours"
    name: "Reset Run Hours"
    name_ko: "누적 운전시간 삭제"
    address: 2          # Manual addr 3 → protocol 2
    function_code: 1
    write_function_code: 5
    data_type: "bool"
    access: "read_write"
    category: "control"
    enum:
      0: "현상유지"
      1: "삭제"

  # === DISCRETE INPUT REGISTERS (FC2) - Read Only ===
  - id: "flow_switch"
    name: "Load Water Flow Switch"
    name_ko: "부하수 유량 스위치"
    address: 1          # Manual addr 10002 → protocol 1
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "pump_output"
    name: "Load Water Pump Output"
    name_ko: "부하수 펌프 출력"
    address: 3          # Manual addr 10004 → protocol 3
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "pump_interlock"
    name: "Load Water Pump Interlock"
    name_ko: "부하수 펌프 인터락"
    address: 5          # Manual addr 10006 → protocol 5
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_4way_valve1"
    name: "Cycle1 4-Way Valve 1"
    name_ko: "사이클1 사방변 밸브1"
    address: 104        # Manual addr 10105 → protocol 104
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_4way_valve2"
    name: "Cycle1 4-Way Valve 2"
    name_ko: "사이클1 사방변 밸브2"
    address: 105
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_hotgas1"
    name: "Cycle1 Hot Gas 1"
    name_ko: "사이클1 핫가스1"
    address: 106
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_hotgas2"
    name: "Cycle1 Hot Gas 2"
    name_ko: "사이클1 핫가스2"
    address: 107
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_sump_heater1"
    name: "Cycle1 Sump Heater 1"
    name_ko: "사이클1 섬프 히터1"
    address: 108
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_sump_heater2"
    name: "Cycle1 Sump Heater 2"
    name_ko: "사이클1 섬프 히터2"
    address: 109
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_inv_comp1"
    name: "Cycle1 Inverter Compressor 1"
    name_ko: "사이클1 인버터 압축기1"
    address: 118        # Manual addr 10119 → protocol 118
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  - id: "cy1_inv_comp2"
    name: "Cycle1 Inverter Compressor 2"
    name_ko: "사이클1 인버터 압축기2"
    address: 119
    function_code: 2
    data_type: "bool"
    access: "read"
    category: "status"
    enum:
      0: "OFF"
      1: "ON"

  # === INPUT REGISTERS (FC4) - Read Only ===
  - id: "controller_ver"
    name: "Controller Version"
    name_ko: "컨트롤러 버전"
    address: 0          # Manual addr 30001 → protocol 0
    function_code: 4
    data_type: "uint16"
    scale: 1
    access: "read"
    category: "info"

  - id: "total_current"
    name: "Total Operating Current"
    name_ko: "전체 운전 전류"
    address: 1          # Manual addr 30002
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "A"
    access: "read"
    category: "electrical"

  - id: "outdoor_temp"
    name: "Outdoor Temperature"
    name_ko: "외기 온도"
    address: 2          # Manual addr 30003
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "supply_water_temp"
    name: "Load Water Supply Temp (Common)"
    name_ko: "부하수 출수 온도"
    address: 3          # Manual addr 30004
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "return_water_temp"
    name: "Load Water Return Temp (Common)"
    name_ko: "부하수 입수 온도"
    address: 4          # Manual addr 30005
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "fault_info"
    name: "Fault Info (1~5)"
    name_ko: "고장 정보"
    address: 7          # Manual addr 30008
    function_code: 4
    data_type: "uint16"
    scale: 1
    access: "read"
    category: "alarm"

  - id: "fault_cycle"
    name: "Fault Cycle Info"
    name_ko: "고장 사이클"
    address: 8          # Manual addr 30009
    function_code: 4
    data_type: "uint16"
    scale: 1
    access: "read"
    category: "alarm"
    enum:
      0: "공통"
      1: "사이클1"
      2: "사이클2"
      3: "사이클3"

  - id: "fault_code"
    name: "Fault Code"
    name_ko: "고장 코드"
    address: 9          # Manual addr 30010
    function_code: 4
    data_type: "uint16"
    scale: 1
    access: "read"
    category: "alarm"
    alarm_map:
      0: "정상"

  - id: "start_wait_time"
    name: "Start Wait Time"
    name_ko: "기동 대기 시간"
    address: 10         # Manual addr 30011
    function_code: 4
    data_type: "uint16"
    scale: 1
    unit: "s"
    access: "read"
    category: "status"

  - id: "stop_wait_time"
    name: "Stop Wait Time"
    name_ko: "정지 대기 시간"
    address: 11         # Manual addr 30012
    function_code: 4
    data_type: "uint16"
    scale: 1
    unit: "s"
    access: "read"
    category: "status"

  - id: "run_hours_high"
    name: "Total Run Hours (High)"
    name_ko: "누적 운전시간 (상위)"
    address: 12         # Manual addr 30013
    function_code: 4
    data_type: "uint16"
    scale: 1
    unit: "h"
    access: "read"
    category: "status"

  - id: "run_hours_low"
    name: "Total Run Hours (Low)"
    name_ko: "누적 운전시간 (하위)"
    address: 13         # Manual addr 30014
    function_code: 4
    data_type: "uint16"
    scale: 1
    unit: "h"
    access: "read"
    category: "status"

  # --- Cycle 1 sensors ---
  - id: "cy1_supply_temp"
    name: "Cycle1 Supply Water Temp"
    name_ko: "사이클1 출수 온도"
    address: 100        # Manual addr 30101
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "cy1_return_temp"
    name: "Cycle1 Return Water Temp"
    name_ko: "사이클1 입수 온도"
    address: 102        # Manual addr 30103
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "cy1_cond_temp_l"
    name: "Cycle1 Condensing Temp (Left)"
    name_ko: "사이클1 응축 온도 (좌)"
    address: 108        # Manual addr 30109
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "cy1_cond_temp_r"
    name: "Cycle1 Condensing Temp (Right)"
    name_ko: "사이클1 응축 온도 (우)"
    address: 109
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "cy1_evap_temp_l"
    name: "Cycle1 Evaporating Temp (Left)"
    name_ko: "사이클1 증발 온도 (좌)"
    address: 110        # Manual addr 30111
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "cy1_evap_temp_r"
    name: "Cycle1 Evaporating Temp (Right)"
    name_ko: "사이클1 증발 온도 (우)"
    address: 111
    function_code: 4
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read"
    category: "temperature"

  - id: "cy1_comp_freq1"
    name: "Cycle1 Inverter Comp Freq 1"
    name_ko: "사이클1 인버터 압축기 주파수1"
    address: 112        # Manual addr 30113
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "Hz"
    access: "read"
    category: "electrical"

  - id: "cy1_comp_freq2"
    name: "Cycle1 Inverter Comp Freq 2"
    name_ko: "사이클1 인버터 압축기 주파수2"
    address: 113
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "Hz"
    access: "read"
    category: "electrical"

  - id: "cy1_high_press_l"
    name: "Cycle1 High Pressure (Left)"
    name_ko: "사이클1 고압 (좌)"
    address: 114        # Manual addr 30115
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "kgf/cm²"
    access: "read"
    category: "pressure"

  - id: "cy1_high_press_r"
    name: "Cycle1 High Pressure (Right)"
    name_ko: "사이클1 고압 (우)"
    address: 115
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "kgf/cm²"
    access: "read"
    category: "pressure"

  - id: "cy1_low_press_l"
    name: "Cycle1 Low Pressure (Left)"
    name_ko: "사이클1 저압 (좌)"
    address: 116        # Manual addr 30117
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "kgf/cm²"
    access: "read"
    category: "pressure"

  - id: "cy1_low_press_r"
    name: "Cycle1 Low Pressure (Right)"
    name_ko: "사이클1 저압 (우)"
    address: 117
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "kgf/cm²"
    access: "read"
    category: "pressure"

  - id: "cy1_current_l"
    name: "Cycle1 Operating Current (Left)"
    name_ko: "사이클1 운전 전류 (좌)"
    address: 118        # Manual addr 30119
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "A"
    access: "read"
    category: "electrical"

  - id: "cy1_current_r"
    name: "Cycle1 Operating Current (Right)"
    name_ko: "사이클1 운전 전류 (우)"
    address: 119
    function_code: 4
    data_type: "uint16"
    scale: 0.1
    unit: "A"
    access: "read"
    category: "electrical"

  # === HOLDING REGISTERS (FC3/FC6) - Read/Write ===
  - id: "operation_mode"
    name: "Operation Mode"
    name_ko: "운전 모드"
    address: 1          # Manual addr 40002 → protocol 1
    function_code: 3
    write_function_code: 6
    data_type: "uint16"
    access: "read_write"
    category: "control"
    enum:
      0: "냉방"
      4: "난방"

  - id: "cooling_setpoint"
    name: "Cooling Target Temperature"
    name_ko: "냉방 목표 온도"
    address: 2          # Manual addr 40003
    function_code: 3
    write_function_code: 6
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read_write"
    min: 5.0
    max: 25.0
    category: "setpoint"

  - id: "heating_setpoint"
    name: "Heating Target Temperature"
    name_ko: "난방 목표 온도"
    address: 3          # Manual addr 40004
    function_code: 3
    write_function_code: 6
    data_type: "int16"
    scale: 0.1
    unit: "°C"
    access: "read_write"
    min: 35.0
    max: 55.0
    category: "setpoint"

  - id: "control_mode"
    name: "Control Mode"
    name_ko: "제어 모드"
    address: 4          # Manual addr 40005
    function_code: 3
    write_function_code: 6
    data_type: "uint16"
    access: "read_write"
    category: "control"
    enum:
      0: "현장 (On-site)"
      1: "원격 (Remote)"
      2: "스케줄 (Scheduled)"

  - id: "remote_mode"
    name: "Remote Mode Type"
    name_ko: "원격 모드"
    address: 5          # Manual addr 40006
    function_code: 3
    write_function_code: 6
    data_type: "uint16"
    access: "read_write"
    category: "control"
    enum:
      0: "접점 (Contact)"
      1: "Modbus"

  - id: "heating_type"
    name: "Heating Type"
    name_ko: "난방 타입"
    address: 6          # Manual addr 40007
    function_code: 3
    write_function_code: 6
    data_type: "uint16"
    access: "read_write"
    category: "control"
    enum:
      0: "일반 (Normal)"
      3: "저온"

  - id: "max_freq"
    name: "Max Operating Frequency"
    name_ko: "최대 운전 주파수"
    address: 7          # Manual addr 40008
    function_code: 3
    write_function_code: 6
    data_type: "uint16"
    access: "read_write"
    category: "control"
    enum:
      0: "120Hz"
      1: "127Hz"
      2: "110Hz"
      3: "100Hz"
      4: "90Hz"
      5: "80Hz"
      6: "70Hz"

  - id: "product_group"
    name: "Product Group Info"
    name_ko: "제품 그룹 정보"
    address: 9997       # Manual addr 39998
    function_code: 4
    data_type: "uint16"
    scale: 1
    access: "read"
    category: "info"

  - id: "product_type"
    name: "Product Type Info"
    name_ko: "제품 유형 정보"
    address: 9998       # Manual addr 39999
    function_code: 4
    data_type: "uint16"
    scale: 1
    access: "read"
    category: "info"

# === Polling Groups ===
polling_groups:
  - name: "fast"
    interval_seconds: 3
    registers:
      - "supply_water_temp"
      - "return_water_temp"
      - "outdoor_temp"
      - "total_current"
      - "run_stop"
      - "fault_code"
      - "fault_info"

  - name: "medium"
    interval_seconds: 10
    registers:
      - "operation_mode"
      - "cooling_setpoint"
      - "heating_setpoint"
      - "flow_switch"
      - "pump_output"
      - "cy1_inv_comp1"
      - "cy1_inv_comp2"
      - "cy1_high_press_l"
      - "cy1_high_press_r"
      - "cy1_low_press_l"
      - "cy1_low_press_r"
      - "cy1_current_l"
      - "cy1_current_r"
      - "cy1_comp_freq1"
      - "cy1_comp_freq2"

  - name: "slow"
    interval_seconds: 60
    registers:
      - "controller_ver"
      - "run_hours_high"
      - "run_hours_low"
      - "control_mode"
      - "remote_mode"
      - "max_freq"
      - "heating_type"
      - "cy1_cond_temp_l"
      - "cy1_cond_temp_r"
      - "cy1_evap_temp_l"
      - "cy1_evap_temp_r"

  - name: "history"
    interval_seconds: 60
    log_to_db: true
    registers:
      - "supply_water_temp"
      - "return_water_temp"
      - "outdoor_temp"
      - "total_current"
      - "cy1_high_press_l"
      - "cy1_low_press_l"
